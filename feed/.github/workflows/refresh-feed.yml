name: Refresh feed

# Mirrors the automation pattern already proven on the Kenya Election Intelligence
# Dashboard. Runs scripts/refresh_feed.py, validates the output with
# scripts/validate_feed.py, and only commits if both succeed - recommendations
# doc §24: "invalid feed updates fail before they reach the app."

on:
  schedule:
    - cron: "0 6,12,18 * * *"   # matches meta.next_expected_update cadence
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh feed.json
        working-directory: scripts
        env:
          RELIEFWEB_APPNAME: ${{ secrets.RELIEFWEB_APPNAME }}
        run: python3 refresh_feed.py --out ../feed.json

      - name: Validate feed.json
        working-directory: scripts
        run: python3 validate_feed.py ../feed.json --taxonomy ../taxonomy.json

      - name: Commit and push if changed
        run: |
          git config user.name "kazi-sasa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feed.json
          git diff --staged --quiet || git commit -m "Refresh feed.json [automated]"
          git push
